<!DOCTYPE html>
<html>

<head>

<title>FutureGram Add Post</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    text-align:center;
    margin:0;
}

.header{
    background:#833AB4;
    color:white;
    padding:15px;
    font-size:28px;
}

.box{
    background:white;
    width:85%;
    margin:30px auto;
    padding:20px;
    border-radius:15px;
}

input,textarea{
    width:85%;
    padding:10px;
    margin:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    padding:10px;
    margin:5px;
    background:#833AB4;
    color:white;
    border:none;
    border-radius:8px;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:#833AB4;
    padding:8px;
}

</style>

</head>


<body>


<div class="header">
➕ Add New Post
</div>


<div class="box">

<h2>Create Post</h2>


<input type="text" placeholder="Image URL">


<br>


<textarea placeholder="Write something..."></textarea>


<br>


<button onclick="post()">
🚀 Post
</button>


</div>



<div class="bottom-nav">

<button onclick="location.href='feed.html'">🏠</button>

<button onclick="location.href='search.html'">🔍</button>

<button onclick="location.href='addpost.html'">➕</button>

<button onclick="location.href='profile.html'">👤</button>

<button onclick="location.href='settings.html'">⚙️</button>

</div>



<script>

function post(){

alert("Post Added Successfully 🚀");

location.href="feed.html";

}

</script>


</body>
</html>
